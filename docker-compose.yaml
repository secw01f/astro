services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      tools:
        condition: service_started
      redis:
        condition: service_started
    env_file:
      - .env
    entrypoint: ["/bin/bash", "entrypoint.sh"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    volumes:
      - specs:/api/specs
      - logs:/var/log/astro
      - files:/var/lib/astro/files

  tools:
    build:
      context: .
      dockerfile: Dockerfile
      target: tools
    env_file:
      - .env
    ports:
      - "7001:7001"
    entrypoint: ["/bin/bash", "entrypoint.sh"]

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  celery:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      api:
        condition: service_healthy
    command: ["python", "-m", "celery", "--app", "src.celery:celery", "worker", "-Q", "celery", "--loglevel=info"]
    volumes:
      - files:/var/lib/astro/files

  celery-interactive:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      api:
        condition: service_healthy
    command: ["python", "-m", "celery", "--app", "src.celery:celery", "worker", "-Q", "interactive", "--concurrency=8", "--loglevel=info"]
    volumes:
      - files:/var/lib/astro/files

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      api:
        condition: service_healthy
    command: ["python", "-m", "celery", "--app", "src.celery:celery", "beat", "--loglevel=info"]

volumes:
  dbdata:
  specs:
  logs:
  files: