services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      tools:
        condition: service_started
      redis:
        condition: service_started
    env_file:
      - .env
    entrypoint: ["/bin/bash", "entrypoint.sh"]
    volumes:
      - specs:/api/specs
      - logs:/var/log/astro

  tools:
    build:
      context: .
      dockerfile: Dockerfile
      target: tools
    env_file:
      - path: .env
        required: false
    expose:
      - "7001"
    entrypoint: ["/bin/bash", "entrypoint.sh"]

  db:
    image: pgvector/pgvector:pg16
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\""]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    env_file:
      - path: .env
        required: false
    command: ["sh", "-c", "redis-server --requirepass \"$${REDIS_PASSWORD}\""]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  dbdata:
  specs:
  logs:
